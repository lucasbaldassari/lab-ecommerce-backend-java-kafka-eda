receivers:
    otlp:
        protocols:
            grpc:
                endpoint: "0.0.0.0:4317"
            http:
                endpoint: "0.0.0.0:4318"

processors:
    batch:
        timeout: 1s
        send_batch_size: 1024
    memory_limiter:
        check_interval: 1s
        limit_mib: 512

exporters:
    otlp/tempo:
        endpoint: "tempo:4317"
        tls:
            insecure: true
    prometheus:
        endpoint: "0.0.0.0:9464"
    loki:
        endpoint: "http://loki:3100/loki/api/v1/push"
        default_labels_enabled:
            exporter: true
            job: true
    debug:
        verbosity: detailed

service:

    pipelines:

        traces:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [otlp/tempo]

        metrics:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [prometheus]

        logs:
            receivers: [otlp]
            processors: [memory_limiter, batch]
            exporters: [loki, debug]
