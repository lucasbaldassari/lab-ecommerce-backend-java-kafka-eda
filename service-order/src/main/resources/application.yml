server:
  port: 8081

spring:
    application:
        name: order-service
    datasource:
        driver-class-name: org.postgresql.Driver
    jpa:
        properties:
            "[hibernate.default_schema]": order_service
            "[hibernate.format_sql]": true
            "[hibernate.jdbc.time_zone]": UTC
            "[hibernate.type.preferred_instant_jdbc_type]": TIMESTAMP_UTC
        hibernate:
            ddl-auto: validate
        defer-datasource-initialization: false
        show-sql: true
    sql:
        init:
            mode: always
            platform: postgres
    jackson:
        time-zone: UTC
        serialization:
            write-dates-as-timestamps: false

management:
    endpoints:
        web:
            exposure:
                include: prometheus,health,info,metrics
    endpoint:
        health:
            show-details: when-authorized
    prometheus:
        metrics:
            export:
                enabled: true
